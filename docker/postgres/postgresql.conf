# PostgreSQL configuration for WAL archiving (incremental backups)
# This file is mounted into the PostgreSQL container

# Listen on all interfaces (required for Docker networking)
listen_addresses = '*'

# Enable WAL archiving
wal_level = replica
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300

# Keep more WAL segments for point-in-time recovery
max_wal_size = 1GB
min_wal_size = 80MB

# For better crash recovery
fsync = on
full_page_writes = on
